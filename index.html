<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>每日打卡</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;padding:16px}
    button,input,textarea{font:inherit}
    button{touch-action:manipulation}
    .app{max-width:520px;margin:0 auto;padding-bottom:24px}
    .hero{background:linear-gradient(180deg,#ffffff 0%,#fdfdfd 100%);color:#1d1d1f;border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid rgba(0,0,0,.06);box-shadow:0 8px 24px rgba(0,0,0,.04)}
    .date{font-size:13px;color:#6e6e73;margin-bottom:6px}
    .title{font-size:24px;font-weight:700;line-height:1.2;letter-spacing:-.01em}
    .progress-row{display:flex;align-items:center;gap:12px;margin-top:16px}
    .count{font-size:24px;font-weight:700;min-width:70px;color:#1d1d1f}
    .count small{font-size:15px;font-weight:600;color:#6e6e73}
    .bar{height:8px;flex:1;border-radius:999px;background:#e5e5ea;overflow:hidden}
    .bar-fill{height:100%;width:0;background:#7bc8a4;border-radius:999px;transition:width .25s ease}
    .card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.04);margin-bottom:14px;overflow:hidden}
    .card-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 8px}
    .card-title{font-size:14px;font-weight:700;color:#6e6e73;letter-spacing:.01em}
    .task-list{min-height:64px}
    .empty{padding:32px 18px;color:#94a3b8;text-align:center;font-size:14px}
    .task{display:flex;align-items:center;gap:12px;padding:14px 18px;border-top:1px solid #f2f2f7}
    .task.done .task-name{text-decoration:line-through;color:#8e8e93}
    .box{width:22px;height:22px;border-radius:999px;border:1.5px solid #c7c7cc;background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
    .box.checked{background:#7bc8a4;border-color:#7bc8a4}
    .box.checked:after{content:"";width:7px;height:12px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
    .task-main{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
    .task-name{font-size:15px;line-height:1.35;word-break:break-word}
    .tag{font-size:12px;line-height:1;padding:5px 8px;border-radius:999px;white-space:nowrap}
    .tag.work{background:#eef8f0;color:#2f7d53}
    .tag.life{background:#f2f2f7;color:#6e6e73}
    .delete{width:32px;height:32px;border:0;background:#fff;color:#b0b0b8;border-radius:8px;font-size:20px;line-height:1}
    .delete:active{background:#fbe9ea;color:#d92d20}
    .add{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px 18px;border-top:1px solid #f1f5f9}
    .add input[type=text]{width:100%;min-width:0;border:1px solid #d2d2d7;border-radius:10px;padding:12px 12px;outline:none;background:#fff}
    .add input[type=text]:focus,.field textarea:focus{border-color:#7bc8a4;box-shadow:0 0 0 3px rgba(123,200,164,.15)}
    .add-options{grid-column:1 / -1;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .work-check{display:flex;align-items:center;gap:8px;color:#475569;font-size:14px}
    .work-check input{width:18px;height:18px;accent-color:#3b82f6}
    .primary,.secondary{border:0;border-radius:10px;padding:11px 16px;font-weight:600}
    .primary{background:#7bc8a4;color:#fff}
    .secondary{background:#eef8f0;color:#245f3e}
    .footer{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .footer button{border:1px solid rgba(0,0,0,.06);background:#fff;color:#1d1d1f;border-radius:10px;padding:13px 10px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.03)}
    .overlay{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.35);padding:16px;z-index:10}
    .overlay.open{display:flex}
    .modal{width:100%;max-width:560px;max-height:88vh;overflow:auto;background:rgba(255,255,255,.96);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.16);backdrop-filter:saturate(180%) blur(20px)}
    .modal-head{position:sticky;top:0;background:rgba(255,255,255,.96);display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid rgba(0,0,0,.06);z-index:1}
    .modal-head h2{font-size:17px;letter-spacing:-.01em}
    .close{width:34px;height:34px;border:0;border-radius:999px;background:#f2f2f7;color:#1d1d1f;font-size:22px;line-height:1}
    .modal-body{padding:16px 18px 18px}
    .stat{background:linear-gradient(180deg,#f7fcf9 0%,#ffffff 100%);color:#1d1d1f;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid rgba(123,200,164,.18)}
    .stat-top{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
    .stat-num{font-size:30px;font-weight:800}
    .stat-note{font-size:13px;color:#6e6e73;text-align:right}
    .mini-bar{height:7px;background:#e5e5ea;border-radius:999px;overflow:hidden;margin-top:10px}
    .mini-bar span{display:block;height:100%;width:0;background:#7bc8a4;border-radius:999px}
    .section{margin:16px 0}
    .section h3{font-size:13px;color:#6e6e73;margin-bottom:9px;font-weight:600}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{display:inline-flex;align-items:center;max-width:100%;padding:7px 10px;border-radius:999px;font-size:14px;line-height:1.25;word-break:break-word}
    .chip.done{background:#eef8f0;color:#2f7d53}
    .chip.pending{background:#f2f2f7;color:#6e6e73}
    .review-box{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:14px;margin-top:14px}
    .field{margin-top:12px}
    .field:first-child{margin-top:0}
    .field label{display:block;font-size:13px;font-weight:600;color:#6e6e73;margin-bottom:7px}
    .field textarea{width:100%;min-height:76px;resize:vertical;border:1px solid #d2d2d7;border-radius:12px;padding:11px 12px;outline:none;line-height:1.45;color:#1d1d1f;background:#fff}
    .log-text{min-height:140px!important;max-height:180px!important;overflow:auto}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .rewrite-box{display:grid;gap:12px;margin-top:14px}
    .rewrite-output{min-height:110px!important;max-height:150px!important;background:#f8fafc;overflow:auto}
    .history-item{padding:14px 0;border-bottom:1px solid #eef2f7}
    .history-item:last-child{border-bottom:0}
    .history-date{font-size:14px;font-weight:700;color:#1d1d1f}
    .history-stats{font-size:13px;color:#6e6e73;margin-top:3px}
    .history-log{white-space:pre-wrap;background:#f8f8fa;border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:10px;margin-top:10px;color:#1d1d1f;font-size:13px;line-height:1.55}
    .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(28,28,30,.96);color:#fff;border-radius:999px;padding:11px 18px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
    @media (max-width:420px){
      body{padding:12px}
      .hero{padding:18px 16px}
      .task,.card-head,.add,.modal-body,.modal-head{padding-left:14px;padding-right:14px}
      .add{grid-template-columns:1fr}
      .primary,.secondary{width:100%}
      .footer{grid-template-columns:1fr}
      .overlay{padding:10px}
      .modal{max-height:92vh}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="date" id="dateDisplay"></div>
      <h1 class="title">每日打卡</h1>
      <div class="progress-row">
        <div class="count" id="progressNum">0/<small>0</small></div>
        <div class="bar"><div class="bar-fill" id="progressFill"></div></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head"><div class="card-title">今日任务</div></div>
      <div class="task-list" id="taskList"></div>
      <div class="add">
        <input id="taskInput" type="text" maxlength="50" placeholder="输入新任务">
        <button class="primary" id="addBtn" type="button">添加</button>
        <div class="add-options">
          <label class="work-check"><input id="workToggle" type="checkbox"> 工作任务</label>
        </div>
      </div>
    </section>

    <div class="footer">
      <button id="reviewBtn" type="button">今日复盘</button>
      <button id="historyBtn" type="button">历史记录</button>
    </div>
  </main>

  <div class="overlay" id="reviewOverlay">
    <section class="modal">
      <div class="modal-head">
        <h2>今日工作复盘</h2>
        <button class="close" id="closeReview" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" id="reviewBody"></div>
    </section>
  </div>

  <div class="overlay" id="historyOverlay">
    <section class="modal">
      <div class="modal-head">
        <h2>历史记录</h2>
        <button class="close" id="closeHistory" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" id="historyBody"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var STORE_KEY = "dk_data";
    var WEEK = ["日","一","二","三","四","五","六"];

    function todayKey(){
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + day;
    }

    function loadData(){
      var base = {t:[], n:1, c:{}, l:{}, r:{}};
      try{
        var raw = JSON.parse(localStorage.getItem(STORE_KEY));
        if(!raw || typeof raw !== "object") return base;
        raw.t = Array.isArray(raw.t) ? raw.t : [];
        raw.n = Number(raw.n) || (raw.t.length + 1);
        raw.c = raw.c && typeof raw.c === "object" ? raw.c : {};
        raw.l = raw.l && typeof raw.l === "object" ? raw.l : {};
        raw.r = raw.r && typeof raw.r === "object" ? raw.r : {};
        return raw;
      }catch(e){
        return base;
      }
    }

    function saveData(data){
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    function escapeHtml(text){
      var node = document.createElement("div");
      node.textContent = text == null ? "" : String(text);
      return node.innerHTML;
    }

    function showToast(text){
      var toast = document.getElementById("toast");
      toast.textContent = text;
      toast.style.opacity = "1";
      clearTimeout(toast._timer);
      toast._timer = setTimeout(function(){toast.style.opacity = "0";}, 1800);
    }

    function render(){
      var data = loadData();
      var date = todayKey();
      var checked = data.c[date] || [];
      var tasks = data.t;
      var list = document.getElementById("taskList");

      if(!tasks.length){
        list.innerHTML = '<div class="empty">添加你的第一项任务吧</div>';
      }else{
        list.innerHTML = tasks.map(function(task){
          var done = checked.indexOf(task.id) >= 0;
          return '<div class="task' + (done ? ' done' : '') + '" data-task-id="' + task.id + '">' +
            '<button class="box' + (done ? ' checked' : '') + '" type="button" data-action="toggle" aria-label="切换完成"></button>' +
            '<div class="task-main" data-action="toggle">' +
              '<span class="task-name">' + escapeHtml(task.name) + '</span>' +
              '<span class="tag ' + (task.w ? 'work' : 'life') + '">' + (task.w ? '工作任务' : '生活') + '</span>' +
            '</div>' +
            '<button class="delete" type="button" data-action="delete" aria-label="删除">×</button>' +
          '</div>';
        }).join("");
      }

      var doneCount = checked.filter(function(id){
        return tasks.some(function(task){return task.id === id;});
      }).length;
      var total = tasks.length;
      document.getElementById("progressNum").innerHTML = doneCount + "/<small>" + total + "</small>";
      document.getElementById("progressFill").style.width = total ? (doneCount / total * 100) + "%" : "0%";

      var now = new Date();
      document.getElementById("dateDisplay").textContent =
        now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日 星期" + WEEK[now.getDay()];
    }

    function addTask(){
      var input = document.getElementById("taskInput");
      var name = input.value.trim();
      if(!name){
        showToast("请输入任务名称");
        input.focus();
        return;
      }
      var data = loadData();
      data.t.push({id:data.n++, name:name, w:document.getElementById("workToggle").checked});
      saveData(data);
      input.value = "";
      document.getElementById("workToggle").checked = false;
      render();
      showToast("已添加");
    }

    function toggleTask(id){
      var data = loadData();
      var date = todayKey();
      if(!Array.isArray(data.c[date])) data.c[date] = [];
      var index = data.c[date].indexOf(id);
      if(index >= 0) data.c[date].splice(index, 1);
      else data.c[date].push(id);
      saveData(data);
      render();
    }

    function deleteTask(id){
      if(!confirm("确认删除这个任务？")) return;
      var data = loadData();
      data.t = data.t.filter(function(task){return task.id !== id;});
      Object.keys(data.c).forEach(function(date){
        data.c[date] = data.c[date].filter(function(taskId){return taskId !== id;});
      });
      saveData(data);
      render();
      showToast("已删除");
    }

    function getWorkState(date){
      var data = loadData();
      var checked = data.c[date] || [];
      var work = data.t.filter(function(task){return task.w;});
      var done = work.filter(function(task){return checked.indexOf(task.id) >= 0;});
      var pending = work.filter(function(task){return checked.indexOf(task.id) < 0;});
      return {data:data, checked:checked, work:work, done:done, pending:pending};
    }

    function names(list){
      return list.map(function(task){return task.name;});
    }

    function completionText(percent){
      if(percent === 100) return "工作任务全部完成，节奏保持得不错。";
      if(percent >= 70) return "主要工作已经推进完成，剩余事项需要安排收尾。";
      if(percent >= 40) return "今天有明确推进，但仍有一部分任务需要继续跟进。";
      if(percent > 0) return "今天完成了一部分工作，明天需要把优先级再收紧。";
      return "今天工作任务还没有完成记录，需要复盘阻碍并重新安排。";
    }

    function buildSummary(){
      var date = todayKey();
      var state = getWorkState(date);
      var total = state.work.length;
      var doneCount = state.done.length;
      var percent = total ? Math.round(doneCount / total * 100) : 0;
      var doneNames = names(state.done);
      var pendingNames = names(state.pending);
      var problems = document.getElementById("problemsInput") ? document.getElementById("problemsInput").value.trim() : "";
      var shortcomings = document.getElementById("shortcomingsInput") ? document.getElementById("shortcomingsInput").value.trim() : "";
      var gains = document.getElementById("gainsInput") ? document.getElementById("gainsInput").value.trim() : "";

      var lines = [];
      lines.push("【今日工作复盘】");
      lines.push("");
      lines.push("复盘点：" + completionText(percent));
      lines.push("工作任务完成：" + doneCount + "/" + total + (total ? "，完成率 " + percent + "%" : ""));
      lines.push("");
      lines.push("【已完成】");
      lines.push(doneNames.length ? doneNames.map(function(name){return "- " + name;}).join("\n") : "- 今日暂无已完成工作任务");
      lines.push("");
      lines.push("【未完成 / 待跟进】");
      lines.push(pendingNames.length ? pendingNames.map(function(name){return "- " + name;}).join("\n") : "- 暂无未完成工作任务");
      lines.push("");
      lines.push("【工作当中遇到的问题】");
      lines.push(problems || "- 暂未填写");
      lines.push("");
      lines.push("【不足】");
      if(shortcomings){
        lines.push(shortcomings);
      }else if(pendingNames.length){
        lines.push("- 有任务未完成，需要明确原因、优先级和下一步时间安排。");
      }else{
        lines.push("- 今日任务完成较完整，后续可继续关注效率和稳定性。");
      }
      lines.push("");
      lines.push("【今日收获】");
      if(gains){
        lines.push(gains);
      }else if(doneNames.length){
        lines.push("- 推进并完成了：" + doneNames.join("、") + "。");
      }else{
        lines.push("- 今天更清楚地看到了需要处理的问题。");
      }
      lines.push("");
      lines.push("【明日跟进】");
      if(pendingNames.length){
        lines.push("- 优先处理：" + pendingNames.join("、") + "。");
      }else{
        lines.push("- 继续保持完成节奏，补充新的工作任务。");
      }
      return lines.join("\n");
    }

    function rewriteStyle(text){
      var raw = (text || "").trim();
      if(!raw) return "";
      var parts = raw.split(/[\n。！？!?；;]+/).map(function(s){return s.trim();}).filter(Boolean);
      var focus = parts.slice(0, 5);
      if(!focus.length) focus = [raw];
      function tidy(s){
        return s
          .replace(/^\s*[一二三四五六七八九十\d]+[\.、)]?\s*/, "")
          .replace(/(今天|本次|这次|本周|本阶段)?(我|我们)/g, "我")
          .replace(/已经/g, "基本")
          .replace(/完成了/g, "推进了")
          .replace(/处理了/g, "梳理了")
          .replace(/解决了/g, "处理好了")
          .replace(/安排/g, "推进")
          .replace(/问题/g, "事项")
          .replace(/任务/g, "工作项")
          .replace(/情况/g, "进展")
          .replace(/，+/g, "，")
          .replace(/。+/g, "。")
          .trim();
      }
      var result = [];
      result.push("今天围绕工作项做了推进，整体节奏比之前更清晰。");
      result.push("主要内容如下：");
      focus.forEach(function(item){
        var line = tidy(item);
        if(line.length > 32) line = line.slice(0, 32) + "…";
        result.push("- " + line);
      });
      result.push("整体来看，当前进展是有的，但后续还需要继续跟进，确保结果落地。");
      return result.join("\n");
    }

    function renderReview(){
      var date = todayKey();
      var state = getWorkState(date);
      var data = state.data;
      var total = state.work.length;
      var doneCount = state.done.length;
      var percent = total ? Math.round(doneCount / total * 100) : 0;
      var reflection = data.r[date] || {};
      var existingLog = data.l[date] || "";

      var doneChips = state.done.length ? state.done.map(function(task){
        return '<span class="chip done">' + escapeHtml(task.name) + '</span>';
      }).join("") : '<span class="chip done">暂无</span>';
      var pendingChips = state.pending.length ? state.pending.map(function(task){
        return '<span class="chip pending">' + escapeHtml(task.name) + '</span>';
      }).join("") : '<span class="chip done">暂无</span>';

      document.getElementById("reviewBody").innerHTML =
        '<div class="stat">' +
          '<div class="stat-top"><div><div>工作任务完成</div><div class="stat-num">' + doneCount + '/' + total + '</div></div><div class="stat-note">' + completionText(percent) + '</div></div>' +
          '<div class="mini-bar"><span style="width:' + percent + '%"></span></div>' +
        '</div>' +
        '<div class="section"><h3>已完成</h3><div class="chips">' + doneChips + '</div></div>' +
        '<div class="section"><h3>未完成 / 待跟进</h3><div class="chips">' + pendingChips + '</div></div>' +
        (total ? '' : '<div class="empty">请先添加“工作任务”，复盘只统计工作任务。</div>') +
        '<div class="review-box">' +
          '<div class="field"><label for="problemsInput">工作当中遇到的问题</label><textarea id="problemsInput" placeholder="例如：被临时事项打断、资料不完整、沟通卡住">' + escapeHtml(reflection.problems || "") + '</textarea></div>' +
          '<div class="field"><label for="shortcomingsInput">今天的不足</label><textarea id="shortcomingsInput" placeholder="例如：开始太晚、优先级不清、没有及时同步">' + escapeHtml(reflection.shortcomings || "") + '</textarea></div>' +
          '<div class="field"><label for="gainsInput">今日收获</label><textarea id="gainsInput" placeholder="例如：完成了关键事项、确认了下一步方向、提升了效率">' + escapeHtml(reflection.gains || "") + '</textarea></div>' +
        '</div>' +
        '<div class="section"><h3>仿写功能</h3><div class="rewrite-box"><textarea class="field" id="rewriteSource" placeholder="把你想改写的工作日志贴在这里，例如日报、周报、会议记录"></textarea><textarea class="field rewrite-output" id="rewriteOutput" placeholder="仿写结果会显示在这里" readonly></textarea><div class="actions"><button class="secondary" id="rewriteBtn" type="button">仿写成我的口吻</button><button class="secondary" id="copyRewriteBtn" type="button">复制结果</button></div></div></div>' +
        '<div class="section"><h3>自动整理后的日志</h3><textarea class="field log-text" id="logText">' + escapeHtml(existingLog || "") + '</textarea></div>' +
        '<div class="actions"><button class="secondary" id="generateBtn" type="button">自动整理</button><button class="primary" id="saveReviewBtn" type="button">保存复盘</button></div>';

      document.getElementById("rewriteBtn").addEventListener("click", function(){
        var source = document.getElementById("rewriteSource").value;
        var output = rewriteStyle(source);
        document.getElementById("rewriteOutput").value = output || "请先输入一段工作日志。";
        if(output) document.getElementById("logText").value = output;
        showToast(output ? "已仿写" : "请先输入内容");
      });
      document.getElementById("copyRewriteBtn").addEventListener("click", function(){
        var output = document.getElementById("rewriteOutput").value.trim();
        if(!output || output === "请先输入一段工作日志。"){
          showToast("没有可复制内容");
          return;
        }
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(output).then(function(){showToast("已复制");}).catch(function(){showToast("复制失败");});
        }else{
          showToast("当前浏览器不支持复制");
        }
      });
      document.getElementById("generateBtn").addEventListener("click", function(){
        document.getElementById("logText").value = buildSummary();
        showToast("已整理");
      });
      document.getElementById("saveReviewBtn").addEventListener("click", saveReview);
      if(!existingLog) document.getElementById("logText").value = buildSummary();
    }

    function openReview(){
      document.getElementById("reviewOverlay").classList.add("open");
      renderReview();
    }

    function closeReview(){
      document.getElementById("reviewOverlay").classList.remove("open");
    }

    function saveReview(){
      var date = todayKey();
      var data = loadData();
      var log = document.getElementById("logText").value.trim();
      data.r[date] = {
        problems: document.getElementById("problemsInput").value.trim(),
        shortcomings: document.getElementById("shortcomingsInput").value.trim(),
        gains: document.getElementById("gainsInput").value.trim()
      };
      data.l[date] = log || buildSummary();
      saveData(data);
      closeReview();
      showToast("复盘已保存");
    }

    function openHistory(){
      var data = loadData();
      var dates = {};
      Object.keys(data.c || {}).forEach(function(date){dates[date] = true;});
      Object.keys(data.l || {}).forEach(function(date){dates[date] = true;});
      var sorted = Object.keys(dates).sort().reverse().slice(0, 90);
      var body = document.getElementById("historyBody");
      document.getElementById("historyOverlay").classList.add("open");
      if(!sorted.length){
        body.innerHTML = '<div class="empty">还没有历史记录</div>';
        return;
      }
      body.innerHTML = sorted.map(function(date){
        var checked = data.c[date] || [];
        var validChecked = checked.filter(function(id){
          return data.t.some(function(task){return task.id === id;});
        });
        var log = data.l[date] || "";
        return '<div class="history-item">' +
          '<div class="history-date">' + escapeHtml(date) + '</div>' +
          '<div class="history-stats">全部任务完成 ' + validChecked.length + '/' + data.t.length + '</div>' +
          (log ? '<div class="history-log">' + escapeHtml(log) + '</div>' : '') +
        '</div>';
      }).join("");
    }

    function closeHistory(){
      document.getElementById("historyOverlay").classList.remove("open");
    }

    document.getElementById("addBtn").addEventListener("click", addTask);
    document.getElementById("taskInput").addEventListener("keydown", function(event){
      if(event.key === "Enter") addTask();
    });
    document.getElementById("taskList").addEventListener("click", function(event){
      var actionNode = event.target.closest("[data-action]");
      var taskNode = event.target.closest(".task");
      if(!actionNode || !taskNode) return;
      var id = Number(taskNode.getAttribute("data-task-id"));
      if(actionNode.getAttribute("data-action") === "delete") deleteTask(id);
      else toggleTask(id);
    });
    document.getElementById("reviewBtn").addEventListener("click", openReview);
    document.getElementById("historyBtn").addEventListener("click", openHistory);
    document.getElementById("closeReview").addEventListener("click", closeReview);
    document.getElementById("closeHistory").addEventListener("click", closeHistory);
    document.getElementById("reviewOverlay").addEventListener("click", function(event){
      if(event.target === this) closeReview();
    });
    document.getElementById("historyOverlay").addEventListener("click", function(event){
      if(event.target === this) closeHistory();
    });

    setTimeout(function(){
      var hour = new Date().getHours();
      var data = loadData();
      if(hour >= 20 && !(data.l[todayKey()] || "").trim() && data.t.some(function(task){return task.w;})) openReview();
    }, 2000);
    setInterval(function(){
      var hour = new Date().getHours();
      var data = loadData();
      var alreadyOpen = document.getElementById("reviewOverlay").classList.contains("open");
      if(hour >= 20 && !alreadyOpen && !(data.l[todayKey()] || "").trim() && data.t.some(function(task){return task.w;})) openReview();
    }, 60000);

    render();
  </script>
</body>
</html>
